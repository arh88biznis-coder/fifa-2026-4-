<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;padding:16px}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.hero-left{display:flex;flex-direction:column;gap:12px}
.tcard{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px}
.t-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.ring-wrap{display:flex;align-items:center;gap:16px}
.ring-stats{display:flex;flex-direction:column;gap:6px;flex:1}
.ring-stat{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.ring-stat-label{color:#888}
.ring-stat-val{font-weight:600}
.done-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px}
.todo-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.mini-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mm{background:#f9f9f9;border-radius:10px;padding:10px 12px;border:1px solid #eee}
.mm-label{font-size:11px;color:#888;margin-bottom:2px}
.mm-val{font-size:20px;font-weight:600}
.mm-sub{font-size:11px;color:#aaa;margin-top:1px}
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pcard{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;position:relative;overflow:hidden}
.pcard.leader{border-color:#FAC775;border-width:2px}
.pcard-accent{position:absolute;top:0;left:0;width:4px;height:100%}
.pcard-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pcard-avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2.5px solid transparent}
.pcard-info{flex:1;min-width:0}
.pcard-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;display:inline-block;margin-top:2px}
.pcard-pts-wrap{text-align:right;flex-shrink:0}
.pcard-pts{font-size:26px;font-weight:700;line-height:1}
.pcard-pts-label{font-size:10px;color:#888}
.badge-gold{background:#FAEEDA;color:#633806}
.badge-silver{background:#F1EFE8;color:#444}
.badge-bronze{background:#FAECE7;color:#712B13}
.badge-4{background:#f0f0f0;color:#888}
.pcard-bars{display:flex;flex-direction:column;gap:5px}
.pbar-row{display:flex;align-items:center;gap:6px;font-size:11px}
.pbar-lbl{color:#888;width:58px;flex-shrink:0}
.pbar-outer{flex:1;background:#f0f0f0;border-radius:3px;height:6px;overflow:hidden}
.pbar-inner{height:100%;border-radius:3px}
.pbar-num{width:22px;text-align:right;font-weight:600;font-size:11px}
.acc-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0}
.acc-label{font-size:11px;color:#888}
.acc-val{font-size:13px;font-weight:600}
.section-hd{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-hd::after{content:'';flex:1;height:1px;background:#eee}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:5px 13px;border:1px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#666}
.tab.active{background:#1a1a1a;color:#fff;border-color:transparent}
.chart-wrap{position:relative;width:100%}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.photo-chart-wrap{position:relative;width:100%;margin-bottom:0}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-left">
    <div class="tcard">
      <div class="t-label">Прогресс турнира</div>
      <div class="ring-wrap">
        <canvas id="donut" width="90" height="90"></canvas>
        <div class="ring-stats">
          <div class="ring-stat"><span class="ring-stat-label"><span class="done-dot"></span>Сыграно</span><span class="ring-stat-val" style="color:#1D9E75">48</span></div>
          <div class="ring-stat"><span class="ring-stat-label"><span class="todo-dot"></span>Осталось</span><span class="ring-stat-val">24</span></div>
          <div class="ring-stat"><span class="ring-stat-label">Всего</span><span class="ring-stat-val">72</span></div>
        </div>
      </div>
      <div style="margin-top:12px;background:#f0f0f0;border-radius:6px;height:8px;overflow:hidden">
        <div style="width:66.7%;height:100%;background:#1D9E75;border-radius:6px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#888">
        <span>0</span><span style="color:#1D9E75;font-weight:600">66.7% завершено</span><span>72</span>
      </div>
    </div>
    <div class="mini-metrics">
      <div class="mm"><div class="mm-label">⚡ Всего очков</div><div class="mm-val">256</div><div class="mm-sub">все 4 игрока</div></div>
      <div class="mm"><div class="mm-label">⭐ Точных</div><div class="mm-val">12</div><div class="mm-sub">из 48 матчей</div></div>

      <div class="mm"><div class="mm-label">🔥 Лидер</div><div class="mm-val" style="color:#E24B4A">Степан</div><div class="mm-sub">+1 очко впереди</div></div>
    </div>
  </div>
  <div class="player-grid" id="playerGrid"></div>
</div>

<div class="section-hd">Накопленный прогресс с фото</div>
<div class="tabs" id="tabs">
  <button class="tab active" data-v="all">Все</button>
  <button class="tab" data-v="Егор">Егор</button>

  <button class="tab" data-v="Степан">Степан</button>
  <button class="tab" data-v="Николай">Николай</button>
</div>
<div class="photo-chart-wrap" style="height:280px">
  <canvas id="lineChart"></canvas>
</div>

<div class="section-hd">Очки за матч</div>
<div class="legend" id="barLegend"></div>

const perMatch={};const cumData={};

const pg=document.getElementById('playerGrid');
sorted.forEach((p,i)=>{
  const acc=((exact[p]+winner[p])/(exact[p]+winner[p]+missed[p])*100).toFixed(0);

  pg.innerHTML+=`<div class="pcard${i===0?' leader':''}">

// Load images for chart plugin
const avatarImgs={};
let loadedCount=0;
players.forEach(p=>{
  const img=new Image();
  img.onload=()=>{ avatarImgs[p]=img; loadedCount++; if(loadedCount===players.length) initCharts(); };
  img.onerror=()=>{ loadedCount++; if(loadedCount===players.length) initCharts(); };
  img.src=photos[p];
});

// Custom plugin: draw avatar circles at last data point
const avatarPlugin={
  id:'avatars',
  afterDraw(chart){
    const {ctx,data}=chart;
    if(chart.config.type!=='line') return;
    data.datasets.forEach((ds,di)=>{
      const name=ds.label;
      if(!avatarImgs[name]) return;
      const meta=chart.getDatasetMeta(di);
      if(meta.hidden||!meta.data.length) return;
      const last=meta.data[meta.data.length-1];
      const x=last.x, y=last.y;
      const r=14;
      ctx.save();
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(avatarImgs[name],x-r,y-r,r*2,r*2);
      ctx.restore();
      // border
      ctx.save();
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.strokeStyle=clr[name];
      ctx.lineWidth=2.5;
      ctx.stroke();
      ctx.restore();
    });
  }
};
Chart.register(avatarPlugin);

function initCharts(){
  new Chart(document.getElementById('donut'),{
    type:'doughnut',
    data:{labels:['Сыграно','Осталось'],datasets:[{data:[48,24],backgroundColor:['#1D9E75','#e0e0e0'],borderWidth:0,borderRadius:3}]},
    options:{responsive:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}}}
  });

  function lineDatasets(view){
    const ps=view==='all'?players:[view];
    return ps.map((p,i)=>({label:p,data:cumData[p],borderColor:clr[p],backgroundColor:clr[p]+'18',pointRadius:0,pointHoverRadius:5,borderWidth:2.5,tension:0.35,fill:view!=='all'}));
  }

  const lineChart=new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{labels,datasets:lineDatasets('all')},
    options:{
      responsive:true,maintainAspectRatio:false,
      layout:{padding:{right:32,top:20,bottom:4}},
      plugins:{
        legend:{display:false},
        avatars:{},
        tooltip:{mode:'index',intersect:false,callbacks:{title:v=>`Матч ${v[0].label}`}}
      },
      scales:{
        x:{ticks:{maxTicksLimit:12,font:{size:10}},grid:{display:false},title:{display:true,text:'Матч №',font:{size:10},color:'#888'}},
        y:{ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'},title:{display:true,text:'Очки',font:{size:10},color:'#888'}}
      }
    }
  });

  function buildBarLegend(ps){
    document.getElementById('barLegend').innerHTML=ps.map(p=>`<span class="leg-item"><span class="leg-sq" style="background:${clr[p]}"></span>${p} ${totals[p]} оч.</span>`).join('');
  }
  buildBarLegend(players);

  const barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels,datasets:players.map(p=>({label:p,data:perMatch[p],backgroundColor:clr[p]+'99',borderColor:clr[p],borderWidth:0.5}))},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{title:v=>`Матч ${v[0].label}`}}},
      scales:{x:{ticks:{maxTicksLimit:12,font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10},stepSize:1},grid:{color:'rgba(0,0,0,0.05)'}}}
    }
  });

  document.getElementById('tabs').addEventListener('click',e=>{
    const tab=e.target.closest('.tab');if(!tab) return;
    const v=tab.dataset.v;
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===tab));
    lineChart.data.datasets=lineDatasets(v);
    lineChart.update();
    const ps=v==='all'?players:[v];
    buildBarLegend(ps);
    barChart.data.datasets=ps.map(p=>({label:p,data:perMatch[p],backgroundColor:clr[p]+'99',borderColor:clr[p],borderWidth:0.5}));
    barChart.update();
  });
}
</script>
</body>
</html>
